{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 20px auto;">
    <div class="card-header" style="text-align: center;">
        <i class="fas fa-user-plus fa-2x"></i>
        <h2>Voter Registration</h2>
    </div>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="e.g. John Doe">
        </div>
        <div class="form-group">
            <label>Email (Login ID)</label>
            <input type="email" name="email" required placeholder="e.g. john@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" required placeholder="e.g. 9876543210">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3" required placeholder="Your residential address"></textarea>
        </div>
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" required       max="2008-02-06">
        </div>
        <div class="form-group">
            <label>Aadhaar ID (Unique ID)</label>
            <input type="text" name="aadhaar_id" required placeholder="Unique ID Number">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>
</div>
{% endblock %}
