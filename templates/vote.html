{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Vote for your Candidate</h2>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div class="dashboard-grid">
            {% for party in parties %}
            <div class="card party-card" style="text-align: center; border: 2px solid transparent; cursor: pointer;">
                <img src="{{ url_for('static', filename='uploads/parties/' + party.symbol_path) }}" class="party-symbol"
                    style="width: 100px; height: 100px;">
                <h3>{{ party.name }}</h3>
                <p>{{ party.description }}</p>
                <input type="radio" name="party_id" value="{{ party.id }}" required style="width: auto; height: 20px;">
                Select
            </div>
            {% endfor %}
        </div>

        <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
            <h3>Verify Identity</h3>
            <p>Please upload your Iris scan to verify your identity before submitting your vote.</p>
            <div class="form-group" style="max-width: 400px;">
                <label>Upload Iris Image</label>
                <input type="file" name="iris_image" required accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Verify & Vote</button>
        </div>
    </form>
</div>
{% endblock %}
